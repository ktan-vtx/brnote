    [data-theme="wasi"] {

      --card-bg: #e9e7e1;
      --text-primary: #2c2c2c;
      --text-secondary: #555555;
      --text-muted: #888888;
      --toolbar-bg: rgba(233, 231, 225, 0.85);
      --toolbar-border: rgba(152, 95, 64, 0.15);
      --accent-color: #985f40;
      --accent-hover: #77432b;
      --accent-rgb: 152, 95, 64;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.08);
      --shadow-inset: inset 0 2px 4px rgba(0, 0, 0, 0.02);
    }

    [data-theme="matrix"] {
      --bg-color: #000000;
      --card-bg: #0d1a0d;
      --text-primary: #33ff33;
      --text-secondary: #11aa11;
      --text-muted: #004400;
      --toolbar-bg: rgba(13, 26, 13, 0.85);
      --toolbar-border: rgba(51, 255, 51, 0.2);
      --accent-color: #33ff33;
      --accent-hover: #11aa11;
      --accent-rgb: 51, 255, 51;
      --shadow-sm: 0 2px 8px rgba(0, 255, 0, 0.2);
      --shadow-md: 0 8px 30px rgba(0, 255, 0, 0.3);
      --shadow-inset: inset 0 2px 4px rgba(0, 0, 0, 0.5);
    }

    /* --- Base Resets & Layout --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: var(--current-font-family);
      font-size: var(--current-font-size);
      line-height: var(--current-line-height);
      font-weight: var(--current-font-weight);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      transition: background-color 0.4s ease, color 0.4s ease, font-size 0.2s ease, line-height 0.2s ease;
    }

    /* --- Floating Glassmorphic Toolbar --- */
    .toolbar-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: center;
      padding: 12px 20px;
      pointer-events: none; /* Let clicks pass through outside toolbar */
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .toolbar-wrapper.hidden {
      transform: translateY(-90%);
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--toolbar-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: none;
      border-radius: 99px;
      padding: 7px 16px;
      pointer-events: auto; /* Enable toolbar interaction */
      box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255, 255, 255, 0.08), inset 0 -1px 0 rgba(0, 0, 0, 0.15);
      transition: box-shadow 0.3s ease;
      max-width: 100%;
      overflow: visible; /* Prevent popups from being clipped */
    }

    .toolbar::-webkit-scrollbar {
      display: none;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 4px;
      position: relative;
    }

    .toolbar-divider {
      width: 1px;
      height: 20px;
      background-color: var(--toolbar-border);
      margin: 0 6px;
      opacity: 0.5;
    }

    /* --- Toolbar Buttons & Controls --- */
    button.tool-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    button.tool-btn:hover {
      background-color: var(--card-bg);
      color: var(--text-primary);
      transform: translateY(-1px);
    }

    button.tool-btn:active {
      transform: translateY(1px);
    }

    button.tool-btn.active {
      background-color: var(--accent-color);
      color: #ffffff;
    }

    /* SVG Icon Sizing */
    button.tool-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* Tooltip */
    button.tool-btn::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: -32px;
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background-color: var(--card-bg);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--toolbar-border);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: all 0.15s ease;
      box-shadow: var(--shadow-sm);
    }

    button.tool-btn:hover::after {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Custom Dropdowns */
    .dropdown-container {
      position: relative;
    }

    .dropdown-menu {
      position: absolute;
      top: 44px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--toolbar-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: none;
      border-radius: 14px;
      padding: 8px;
      min-width: 140px;
      box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255, 255, 255, 0.08), inset 0 -1px 0 rgba(0, 0, 0, 0.1);
      display: none;
      flex-direction: column;
      gap: 4px;
      z-index: 110;
    }

    .dropdown-container.open .dropdown-menu {
      display: flex;
      animation: dropdownFade 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes dropdownFade {
      to {
        transform: translateX(-50%) translateY(0);
      }
    }

    .dropdown-item {
      background: transparent;
      border: none;
      text-align: left;
      color: var(--text-secondary);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 13px;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .dropdown-item:hover {
      background-color: var(--toolbar-border);
      color: var(--text-primary);
    }

    .dropdown-item.active {
      color: var(--accent-color);
      font-weight: 600;
    }

    /* Theme Selector specific styles */
    .theme-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* Toolbar Toggle Button */
    .toolbar-toggle-handle {
      position: fixed;
      top: 16px;
      right: 24px;
      width: 36px;
      height: 36px;
      background-color: var(--toolbar-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      z-index: 101;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      color: var(--text-secondary);
    }

    .toolbar-toggle-handle:hover {
      background-color: var(--card-bg);
      color: var(--text-primary);
      transform: scale(1.05);
    }

    /* Floating Info Button (Bottom Left) */
    .info-btn {
      position: fixed;
      bottom: 16px;
      left: 24px;
      width: 36px;
      height: 36px;
      background-color: var(--toolbar-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      z-index: 101;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      color: var(--text-secondary);
    }

    .info-btn:hover {
      background-color: var(--card-bg);
      color: var(--text-primary);
      transform: scale(1.05);
    }

    .info-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .info-btn.hidden {
      transform: translateY(60px);
      opacity: 0;
      pointer-events: none;
    }

    /* Tooltip styling for info-btn */
    .info-btn::after {
      content: attr(data-tooltip);
      position: absolute;
      top: -32px;
      left: 50%;
      transform: translateX(-50%) translateY(-4px);
      background-color: var(--card-bg);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--toolbar-border);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: all 0.15s ease;
      box-shadow: var(--shadow-sm);
    }

    .info-btn:hover::after {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Floating Menu Button (Top Left) */
    .menu-toggle-btn {
      position: fixed;
      top: 16px;
      left: 24px;
      width: 36px;
      height: 36px;
      background-color: var(--toolbar-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      z-index: 101;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      color: var(--text-secondary);
    }

    .menu-toggle-btn:hover {
      background-color: var(--card-bg);
      color: var(--text-primary);
      transform: scale(1.05);
    }

    .menu-toggle-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .menu-toggle-btn.hidden {
      transform: translateY(-60px);
      opacity: 0;
      pointer-events: none;
    }

    .menu-toggle-btn::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: -32px;
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background-color: var(--card-bg);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--toolbar-border);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: all 0.15s ease;
      box-shadow: var(--shadow-sm);
    }

    .menu-toggle-btn:hover::after {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Slide-out Sidebar */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 260px;
      height: 100vh;
      background: var(--toolbar-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 4px 0 30px rgba(0, 0, 0, 0.2);
      z-index: 990;
      transform: translateX(-100%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      font-family: var(--font-sans);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      z-index: 980;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .sidebar-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px dashed var(--toolbar-border);
      padding-bottom: 12px;
    }

    .sidebar-header h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .new-note-btn {
      background: var(--accent-color);
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
    }

    .new-note-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-right: 4px;
    }

    .sidebar-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s ease;
      position: relative;
      font-size: 13px;
    }

    .sidebar-item:hover {
      background: var(--toolbar-border);
      color: var(--text-primary);
    }

    .sidebar-item.active {
      background: rgba(var(--accent-rgb), 0.15);
      color: var(--accent-color);
      font-weight: 600;
    }

    .sidebar-item-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-right: 8px;
    }

    .sidebar-item-delete {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      opacity: 0;
      transition: all 0.2s ease;
    }

    .sidebar-item:hover .sidebar-item-delete {
      opacity: 1;
    }

    .sidebar-item-delete:hover {
      background: #ef4444;
      color: white;
    }

    .sidebar-item-pin {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      opacity: 0;
      transition: all 0.2s ease;
      margin-right: 4px;
    }

    .sidebar-item-pin.pinned {
      opacity: 1;
      color: var(--accent-color);
    }

    .sidebar-item:hover .sidebar-item-pin {
      opacity: 1;
    }

    .sidebar-item-pin:hover {
      background: rgba(var(--accent-rgb), 0.2);
    }

    .sidebar-item-rename {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      opacity: 0;
      transition: all 0.2s ease;
      margin-right: 4px;
    }

    .sidebar-item:hover .sidebar-item-rename {
      opacity: 1;
    }

    .sidebar-item-rename:hover {
      background: rgba(var(--accent-rgb), 0.2);
    }

    .sidebar-edit-btn {
      background: transparent;
      border: 1px solid var(--text-muted);
      color: var(--text-muted);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .sidebar-edit-btn:hover {
      background: rgba(var(--accent-rgb), 0.1);
      color: var(--accent-color);
      border-color: var(--accent-color);
    }
    
    .sidebar-edit-btn.active {
      background: var(--accent-color);
      color: white;
      border-color: var(--accent-color);
    }

    .sidebar-footer {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--toolbar-border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .bulk-delete-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      text-align: center;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-sm);
    }

    .bulk-delete-btn:hover {
      background: #dc2626;
    }
    
    .bulk-delete-btn:disabled {
      background: var(--text-muted);
      opacity: 0.5;
      cursor: not-allowed;
    }

    .sidebar-item-checkbox {
      margin-right: 10px;
      width: 16px;
      height: 16px;
      accent-color: var(--accent-color);
      cursor: pointer;
    }

    /* --- Speech & Status Indicator --- */
    .recording-pulse {
      position: absolute;
      width: 8px;
      height: 8px;
      background-color: #ef4444;
      border-radius: 50%;
      top: 4px;
      right: 4px;
      animation: pulse 1.2s infinite;
      display: none;
    }

    @keyframes pulse {
      0% { transform: scale(0.9); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.5; }
      100% { transform: scale(0.9); opacity: 1; }
    }

    /* --- Editor Container --- */
    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 90px 20px 40px;
      width: 100%;
      max-width: 840px;
      margin: 0 auto;
      position: relative;
      transition: max-width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-width-mode="full"] .main-container {
      max-width: 96%;
    }

    .editor {
      width: 100%;
      flex-1: 1;
      min-height: 70vh;
      outline: none;
      color: var(--text-primary);
      transition: font-weight 0.15s ease;
      caret-color: var(--accent-color);
      display: flow-root;
    }

    /* Placeholder text */
    .editor:empty::before {
      content: "ここにテキストを入力、画像をペースト、または音声を録音してください...";
      color: var(--text-muted);
      pointer-events: none;
      display: block;
    }

    /* --- Paste Image Block --- */
    .image-block {
      display: inline-flex;
      flex-direction: column;
      background: var(--toolbar-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: none;
      border-radius: 16px;
      padding: 12px;
      margin: 18px 0;
      max-width: 100%;
      position: relative;
      box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      animation: itemFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .image-block img {
      max-width: 100%;
      max-height: 450px;
      border-radius: 10px;
      object-fit: contain;
      -webkit-user-drag: none; /* Disable browser native image dragging */
      user-select: none;
    }

    .image-comment {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      background-color: rgba(0, 0, 0, 0.06);
      border: none;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 14px;
      outline: none;
      min-height: 36px;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-inset);
    }

    .image-comment:focus {
      background-color: rgba(0, 0, 0, 0.12);
      box-shadow: var(--shadow-inset), 0 0 0 2px var(--accent-color);
    }

    .image-comment:empty::before {
      content: "メモやコメントを書き込む...";
      color: var(--text-muted);
      pointer-events: none;
    }

    /* Delete Button for cards */
    .delete-btn {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background-color: #ef4444;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      box-shadow: var(--shadow-sm);
      z-index: 10;
    }

    .image-block:hover .delete-btn,
    .btn-wrapper:hover .delete-btn {
      opacity: 1;
    }

    .delete-btn:hover {
      transform: scale(1.1);
      background-color: #dc2626;
    }

    /* --- Interactive Action Buttons --- */
    .btn-wrapper {
      display: inline-flex;
      position: relative;
      margin: 4px 6px;
      vertical-align: middle;
      animation: itemFadeIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .custom-action-btn {
      background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
      color: white !important;
      border: none;
      padding: 6px 14px;
      border-radius: 20px;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
    }

    .custom-action-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(var(--accent-rgb), 0.3);
    }

    .custom-action-btn:active {
      transform: translateY(1px);
    }

    /* Toast Notification for actions */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--toolbar-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: var(--text-primary);
      border: none;
      padding: 12px 24px;
      border-radius: 99px;
      font-size: 14px;
      font-family: var(--font-sans);
      font-weight: 500;
      box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* --- Modals --- */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--toolbar-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: none;
      border-radius: 20px;
      width: 100%;
      max-width: 440px;
      padding: 24px;
      box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      font-family: var(--font-sans);
      animation: modalSlide 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes modalSlide {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .modal-description {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 18px;
    }

    .form-group {
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-input, .form-select {
      background-color: rgba(0, 0, 0, 0.1);
      border: none;
      color: var(--text-primary);
      padding: 10px 14px;
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-inset);
    }

    .form-input:focus, .form-select:focus {
      background-color: rgba(0, 0, 0, 0.18);
      box-shadow: var(--shadow-inset), 0 0 0 2px var(--accent-color);
    }

    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
    }

    .modal-btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      font-family: var(--font-sans);
      transition: all 0.2s ease;
    }

    .modal-btn-cancel {
      background-color: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--toolbar-border);
    }

    .modal-btn-cancel:hover {
      background-color: var(--toolbar-border);
      color: var(--text-primary);
    }

    .modal-btn-confirm {
      background-color: var(--accent-color);
      color: white;
    }

    .modal-btn-confirm:hover {
      background-color: var(--accent-hover);
    }

    /* --- Animation Utilities --- */
    @keyframes itemFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Help view styling */
    .help-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 300px;
      overflow-y: auto;
      padding-right: 8px;
      font-size: 13px;
    }

    .help-item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid var(--toolbar-border);
      padding-bottom: 8px;
    }

    .kbd {
      background-color: var(--bg-color);
      border: 1px solid var(--toolbar-border);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-primary);
      box-shadow: var(--shadow-inset);
    }


    .bookmarklet-link {
      display: inline-block;
      background-color: var(--accent-color);
      color: white !important;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: var(--shadow-sm);
      cursor: grab;
      margin-top: 8px;
      transition: all 0.2s ease;
    }

    .bookmarklet-link:hover {
      background-color: var(--accent-hover);
      transform: scale(1.02);
    }

    /* Word Counter - Fixed at the very bottom right */
    .stats-bar {
      position: fixed;
      bottom: 16px;
      right: 24px;
      display: flex;
      gap: 12px;
      font-size: 11px;
      font-family: var(--font-sans);
      color: var(--text-secondary);
      background-color: var(--toolbar-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--toolbar-border);
      padding: 6px 12px;
      border-radius: 20px;
      box-shadow: var(--shadow-sm);
      z-index: 90;
      opacity: 0.5;
      transition: opacity 0.2s ease;
    }

    .stats-bar:hover {
      opacity: 1;
    }

    /* Column Row Styles */
    .column-row {
      display: flex;
      gap: 0;
      margin: 20px 0;
      width: 100%;
      position: relative;
      border: 1px dashed var(--toolbar-border);
      border-radius: 12px;
      padding: 4px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .column-row:hover {
      border-color: rgba(var(--accent-rgb), 0.5);
      box-shadow: var(--shadow-sm);
    }

    .column-cell {
      min-height: 120px;
      outline: none;
      padding: 12px;
      border-radius: 8px;
      background-color: rgba(var(--accent-rgb), 0.01);
      border: 1px solid transparent;
      transition: background-color 0.2s ease;
      overflow-y: auto;
    }

    .column-cell:focus {
      background-color: rgba(var(--accent-rgb), 0.03);
    }

    .column-cell:empty::before {
      content: attr(data-placeholder);
      color: var(--text-muted);
      pointer-events: none;
      display: block;
    }

    .column-divider {
      width: 8px;
      margin: 0 4px;
      cursor: col-resize;
      background-color: transparent;
      transition: background-color 0.2s ease;
      border-radius: 4px;
      position: relative;
    }

    .column-divider:hover,
    .column-divider:active {
      background-color: var(--accent-color);
    }

    .column-row > .delete-btn {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background-color: #ef4444;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      box-shadow: var(--shadow-sm);
      z-index: 10;
    }

    .column-row:hover > .delete-btn {
      opacity: 1;
    }

    /* Mobile Responsive Optimizations */
    @media (max-width: 600px) {
      .column-row {
        flex-direction: column !important;
        gap: 12px;
      }
      .column-cell {
        width: 100% !important;
      }
      .column-divider {
        display: none !important;
      }
      
      /* Toolbar adjustments for smaller touch screens */
      .toolbar-wrapper {
        padding: 8px 10px;
      }
      .toolbar {
        padding: 4px 10px;
        gap: 4px;
        overflow-x: auto;
        border-radius: 20px;
        max-width: 90%;
      }
      
      /* Hide scrollbar of scrollable toolbars on mobile */
      .toolbar::-webkit-scrollbar {
        display: none;
      }
      
      .stats-bar {
        bottom: 8px;
        right: 12px;
      }
      .toolbar-toggle-handle {
        top: 8px;
        right: 12px;
      }
      .menu-toggle-btn {
        top: 8px;
        left: 12px;
      }
      
      .main-container {
        padding: 70px 12px 30px;
      }
      
      /* Disable floating image text wrapping on narrow screens */
      .image-block.align-left, 
      .image-block.align-right {
        float: none !important;
        margin: 16px 0 !important;
        width: 100% !important;
      }
    }

    /* Resizable Image block and handles */
    .image-block {
      position: relative;
      transition: float 0.3s ease, margin 0.3s ease;
    }

    /* Alignment Styles for Image Blocks */
    .image-block.align-left {
      float: left;
      margin: 12px 24px 12px 0;
      clear: left;
    }

    .image-block.align-right {
      float: right;
      margin: 12px 0 12px 24px;
      clear: right;
    }

    .image-block.align-center {
      float: none;
      display: inline-flex;
      margin: 18px 0;
      clear: both;
    }

    /* Image Controls Overlay */
    .image-controls {
      position: absolute;
      top: -8px;
      left: 12px;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 20;
    }

    .image-block:hover .image-controls {
      opacity: 1;
    }

    .image-controls button.control-btn {
      background: var(--toolbar-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: none;
      border-radius: 6px;
      color: var(--text-secondary);
      cursor: pointer;
      width: 26px;
      height: 26px;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      transition: all 0.2s ease;
    }

    .image-controls button.control-btn:hover {
      background-color: var(--card-bg);
      color: var(--text-primary);
      transform: translateY(-1px);
    }

    .image-controls button.control-btn.active {
      background: var(--accent-color);
      color: white;
      box-shadow: 0 2px 8px rgba(var(--accent-rgb), 0.3);
    }

    .image-resize-handle {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 16px;
      height: 16px;
      cursor: se-resize;
      background: linear-gradient(135deg, transparent 50%, var(--accent-color) 50%);
      border-bottom-right-radius: 12px;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 10; /* Float above comments/images */
      user-select: none; /* Prevent text highlight on drag */
      pointer-events: auto;
    }

    .image-block:hover .image-resize-handle {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- Hidden configuration container (used to bake state during file serialization) -->
  <div id="app-config" style="display: none;" 
       data-saved-theme="carbon" 
       data-saved-font="sans" 
       data-saved-size="18px" 
       data-saved-height="1.6" 
       data-saved-bold="false">
  </div>

  <!-- Floating Menu Button (Top Left) -->
  <button class="menu-toggle-btn" id="menu-toggle" onclick="toggleSidebar()" data-tooltip="ノート一覧" title="ノート一覧" aria-label="メニュー">
    <svg viewBox="0 0 24 24">
      <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
    </svg>
  </button>

  <!-- Slide-out Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header" style="flex-direction: column; align-items: stretch; gap: 10px;">
      <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <h3 style="margin: 0;">マイノート</h3>
        <button class="sidebar-edit-btn" onclick="toggleEditMode()" id="sidebar-edit-btn">選択削除</button>
      </div>
      <button class="new-note-btn" onclick="createNewNote()">＋ 新規メモ</button>
    </div>
    <div class="sidebar-list" id="sidebar-list">
      <!-- Generated via JS -->
    </div>
    <div class="sidebar-footer" id="sidebar-footer" style="display: none;">
      <button class="bulk-delete-btn" onclick="deleteSelectedNotes()" id="bulk-delete-btn" disabled>選択したメモを削除 (0)</button>
    </div>
  </div>

  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <!-- Floating Info Button (Bottom Left) -->
  <button class="info-btn" id="info-btn" onclick="openHelpModal()" data-tooltip="ヘルプ/情報" title="ヘルプ/情報" aria-label="情報">
    <svg viewBox="0 0 24 24">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
    </svg>
  </button>

  <!-- Toolbar Toggle Trigger -->
  <div class="toolbar-toggle-handle" id="toolbar-toggle" title="ツールバーを隠す">
    <svg viewBox="0 0 24 24" id="toggle-chevron" style="width:16px; height:16px; fill:currentColor; transition:transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);">
      <path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/>
    </svg>
  </div>

  <!-- Toolbar Container -->
  <div class="toolbar-wrapper" id="toolbar-wrapper">
    <div class="toolbar" id="main-toolbar">
      
      <!-- Group 1: Typography -->
      <div class="toolbar-group">
        
        <!-- Font Selection -->
        <div class="dropdown-container" id="font-dropdown-container">
          <button class="tool-btn" id="font-btn" data-tooltip="フォントの種類" title="フォントの種類" aria-label="フォントの種類">
            <svg viewBox="0 0 24 24">
              <path d="M12.5 2h-1L6 16.5h1.7l1.2-3.2h6.2l1.2 3.2h1.7L12.5 2zm-3 9.7l2.5-6.6 2.5 6.6H9.5z"/>
            </svg>
          </button>
          <div class="dropdown-menu">
            <button class="dropdown-item active" onclick="setFont('sans')"><span>Sans-Serif</span> <small>Outfit</small></button>
            <button class="dropdown-item" onclick="setFont('serif')"><span>Serif</span> <small>Playfair</small></button>
            <button class="dropdown-item" onclick="setFont('mono')"><span>Monospace</span> <small>Fira</small></button>
          </div>
        </div>

  <!-- --- JAVASCRIPT --- -->
  <script>
    // --- IndexedDB Database Wrapper ---
    const DB_NAME = 'brnote_db';
    const STORE_NAME = 'notes';
    let db = null;

    function initDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME);
          }
        };
        request.onsuccess = (e) => {
          db = e.target.result;
          resolve(db);
        };
        request.onerror = (e) => {
          reject(e.target.error);
        };
      });
    }

    function getDBValue(key) {
      return new Promise((resolve) => {
        if (!db) return resolve(null);
        const transaction = db.transaction([STORE_NAME], 'readonly');
        const store = transaction.objectStore(STORE_NAME);
        const request = store.get(key);
        request.onsuccess = () => resolve(request.result || null);
        request.onerror = () => resolve(null);
      });
    }

    function setDBValue(key, value) {
      return new Promise((resolve) => {
        if (!db) return resolve();
        const transaction = db.transaction([STORE_NAME], 'readwrite');
        const store = transaction.objectStore(STORE_NAME);
        const request = store.put(value, key);
        request.onsuccess = () => resolve();
        request.onerror = (err) => {
          console.error("Failed to write to IndexedDB:", err);
          resolve();
        };
      });
    }

    function clearDB() {
      return new Promise((resolve) => {
        if (!db) return resolve();
        const transaction = db.transaction([STORE_NAME], 'readwrite');
        const store = transaction.objectStore(STORE_NAME);
        const request = store.clear();
        request.onsuccess = () => resolve();
        request.onerror = () => resolve();
      });
    }

    function deleteDBValue(key) {
      return new Promise((resolve) => {
        if (!db) return resolve();
        const transaction = db.transaction([STORE_NAME], 'readwrite');
        const store = transaction.objectStore(STORE_NAME);
        const request = store.delete(key);
        request.onsuccess = () => resolve();
        request.onerror = () => resolve();
      });
    }

    // Debouncing utility for saves
    function debounce(func, delay) {
      let timeoutId;
      return function(...args) {
        if (timeoutId) clearTimeout(timeoutId);
        timeoutId = setTimeout(() => {
          func.apply(this, args);
        }, delay);
      };
    }

    // Constants & Global State
    const editor = document.getElementById('editor');
    const appConfig = document.getElementById('app-config');
    const toolbarWrapper = document.getElementById('toolbar-wrapper');
    const toolbarToggle = document.getElementById('toolbar-toggle');
    const voiceBtn = document.getElementById('voice-btn');
    const voicePulse = document.getElementById('voice-pulse');
    const boldBtn = document.getElementById('bold-btn');
    const lhBtn = document.getElementById('lh-btn');

    let recognition = null;
    let isEditMode = false;
    let selectedNoteIds = new Set();

    // Config default parameters
    let state = {
      theme: 'carbon',
      font: 'sans',
      fontSize: 18,
      lineHeight: 1.6,
      bold: false,
      toolbarPinned: true,
      fullWidth: true, // Default to true as user requested full screen layout
      currentNoteId: null,
      notesList: [] // [{ id, title, updatedAt }]
    };

    // --- Bootstrapping & Setup ---
    window.addEventListener('DOMContentLoaded', async () => {
      // 1. Initialize IndexedDB
      try {
        await initDB();
      } catch (err) {
        console.warn("IndexedDB initialization failed. Falling back to localStorage.", err);
      }

      // 2. Initial State Loading
      loadConfigFromHTML();
      await loadConfigFromStorage();
      applyAllStyles();
      
      // 3. Load Saved Editor Contents (Multiple Notes Support)
      let currentId = null;
      let notesList = null;

      if (db) {
        currentId = await getDBValue('brnote_current_id');
        notesList = await getDBValue('brnote_notes_list');
      } else {
        currentId = localStorage.getItem('brnote_current_id');
        const listStr = localStorage.getItem('brnote_notes_list');
        if (listStr) notesList = JSON.parse(listStr);
      }

      state.notesList = notesList || [];
      state.currentNoteId = currentId;

      // A. Migration logic for old single note users
      let oldContent = null;
      if (db) {
        oldContent = await getDBValue('brnote_content');
      } else {
        oldContent = localStorage.getItem('brnote_content');
      }

      if (oldContent) {
        const oldId = Date.now().toString();
        const migratedNote = {
          id: oldId,
          title: '最初のメモ (移行済み)',
          updatedAt: Date.now()
        };
        state.notesList.push(migratedNote);
        state.currentNoteId = oldId;

        if (db) {
          await setDBValue('note_' + oldId, oldContent);
          await setDBValue('brnote_content', null); // Clear old content
        } else {
          localStorage.setItem('note_' + oldId, oldContent);
          localStorage.removeItem('brnote_content');
        }

        await saveNotesListToStorage();
        await saveCurrentNoteIdToStorage();
      }

      // B. Create a welcome note if no notes exist
      if (state.notesList.length === 0) {
        const initialId = Date.now().toString();
        const initialNote = {
          id: initialId,
          title: 'はじめに',
          updatedAt: Date.now()
        };
        state.notesList.push(initialNote);
        state.currentNoteId = initialId;

        const defaultWelcomeText = `<div><h1>brnote へようこそ！</h1><p>これはあなた専用の美しいスクラッチパッドメモ帳です。左上のメニューボタン（三本線）から、新しいノートを追加して複数管理することができます。</p><p>この文章を消して、自由に書き始めてください！</p></div>`;
        
        if (db) {
          await setDBValue('note_' + initialId, defaultWelcomeText);
        } else {
          localStorage.setItem('note_' + initialId, defaultWelcomeText);
        }

        await saveNotesListToStorage();
        await saveCurrentNoteIdToStorage();
      }

      // C. Load active note contents
      let currentContent = null;
      if (db) {
        currentContent = await getDBValue('note_' + state.currentNoteId);
      } else {
        currentContent = localStorage.getItem('note_' + state.currentNoteId);
      }

      if (currentContent) {
        editor.innerHTML = currentContent;
      } else {
        // Fallback for self-contained baked content (baked via download)
        const bakedContent = `<!-- BAKED_CONTENT_START -->`;
        if (bakedContent && !bakedContent.startsWith('<!--')) {
          editor.innerHTML = bakedContent;
        }
      }

      // D. Draw sidebar lists
      renderSidebarList();

      // Ensure all loaded image blocks are draggable
      editor.querySelectorAll('.image-block').forEach(imgBlock => {
        imgBlock.draggable = true;
      });

      // 4. Dropdowns Setup
      setupDropdowns();

      // 5. Setup Keybinds
      setupKeybinds();

      // Setup Markdown Auto-Format Assist
      setupMarkdownAutoFormat();


      // 7. Setup Listeners
      editor.addEventListener('input', () => {
        saveContentDebounced();
        updateStats();
      });
      updateStats();

      // Image pasting interceptor
      editor.addEventListener('paste', handleImagePaste);

      // Mouse position tracker for toolbar slide down
      window.addEventListener('mousemove', handleToolbarHoverTrigger);

      // Click toggle handle
      toolbarToggle.addEventListener('click', toggleToolbarPin);

      // Drag resize listener initializer
      setupResizeAndDividerListeners();
    });

    // --- Configuration State Management ---
    function loadConfigFromHTML() {
      // Load configuration loaded in HTML dataset if present (for self-packaged state)
      if (appConfig.dataset.savedTheme) state.theme = appConfig.dataset.savedTheme;
      if (appConfig.dataset.savedFont) state.font = appConfig.dataset.savedFont;
      if (appConfig.dataset.savedSize) state.fontSize = parseInt(appConfig.dataset.savedSize) || 18;
      if (appConfig.dataset.savedHeight) state.lineHeight = parseFloat(appConfig.dataset.savedHeight) || 1.6;
      if (appConfig.dataset.savedBold) state.bold = appConfig.dataset.savedBold === 'true';
      if (appConfig.dataset.savedWidth) state.fullWidth = appConfig.dataset.savedWidth === 'true';
    }

    async function loadConfigFromStorage() {
      let saved = null;
      if (db) {
        saved = await getDBValue('brnote_settings');
      } else {
        saved = localStorage.getItem('brnote_settings');
      }

      if (saved) {
        try {
          const parsed = typeof saved === 'string' ? JSON.parse(saved) : saved;
          state = { ...state, ...parsed };
        } catch(e) {
          console.error("Settings corrupted. Resetting.");
        }
      }
    }

    async function saveConfigToStorage() {
      if (db) {
        await setDBValue('brnote_settings', state);
      } else {
        localStorage.setItem('brnote_settings', JSON.stringify(state));
      }
    }

    async function saveNotesListToStorage() {
      if (db) {
        await setDBValue('brnote_notes_list', state.notesList);
      } else {
        localStorage.setItem('brnote_notes_list', JSON.stringify(state.notesList));
      }
    }

    async function saveCurrentNoteIdToStorage() {
      if (db) {
        await setDBValue('brnote_current_id', state.currentNoteId);
      } else {
        localStorage.setItem('brnote_current_id', state.currentNoteId);
      }
    }

    async function saveContent() {
      if (!state.currentNoteId) return;

      const content = editor.innerHTML;
      
      // 1. Save note body
      if (db) {
        await setDBValue('note_' + state.currentNoteId, content);
      } else {
        localStorage.setItem('note_' + state.currentNoteId, content);
      }

      // 2. Extract title (first line of plaintext, max 30 chars)
      const text = editor.innerText || '';
      let title = text.trim().split('\n')[0] || '';
      title = title.substring(0, 30).trim();
      if (!title || title === '\u00A0' || title.length === 0) {
        title = '無題のメモ';
      }

      // 3. Update metadata
      const noteMeta = state.notesList.find(n => n.id === state.currentNoteId);
      if (noteMeta) {
        if (noteMeta.isCustomTitle) {
          noteMeta.updatedAt = Date.now();
          await saveNotesListToStorage();
          return;
        }

        const titleChanged = noteMeta.title !== title;
        noteMeta.title = title;
        noteMeta.updatedAt = Date.now();
        
        await saveNotesListToStorage();
        if (titleChanged) {
          renderSidebarList();
        }
      }
    }

    // --- Sidebar Navigation & Multiple Notes Logic ---
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      sidebar.classList.toggle('open');
      overlay.classList.toggle('open');
    }

    function closeSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      sidebar.classList.remove('open');
      overlay.classList.remove('open');
    }

    function renderSidebarList() {
      const listEl = document.getElementById('sidebar-list');
      if (!listEl) return;
      listEl.innerHTML = '';
      
      const sortedList = [...state.notesList].sort((a, b) => {
        const aPinned = a.pinned ? 1 : 0;
        const bPinned = b.pinned ? 1 : 0;
        if (aPinned !== bPinned) {
          return bPinned - aPinned;
        }
        return b.updatedAt - a.updatedAt;
      });

      sortedList.forEach(note => {
        const item = document.createElement('div');
        item.className = 'sidebar-item';
        if (note.id === state.currentNoteId) {
          item.classList.add('active');
        }

        // チェックボックス（編集モード時のみ）
        let checkbox = null;
        if (isEditMode) {
          checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.className = 'sidebar-item-checkbox';
          checkbox.checked = selectedNoteIds.has(note.id);
          checkbox.addEventListener('click', (e) => e.stopPropagation());
          checkbox.addEventListener('change', () => {
            if (checkbox.checked) {
              selectedNoteIds.add(note.id);
            } else {
              selectedNoteIds.delete(note.id);
            }
            updateBulkDeleteButton();
          });
          item.appendChild(checkbox);
          
          item.addEventListener('click', () => {
            checkbox.checked = !checkbox.checked;
            checkbox.dispatchEvent(new Event('change'));
          });
        } else {
          item.addEventListener('click', () => {
            loadNote(note.id);
            closeSidebar();
          });
        }

        const titleEl = document.createElement('span');
        titleEl.className = 'sidebar-item-title';
        titleEl.innerText = note.title || '無題のメモ';
        item.appendChild(titleEl);

        // 編集モード以外なら、ピン・リネーム・削除ボタンを表示
        if (!isEditMode) {
          const pinBtn = document.createElement('button');
          pinBtn.className = 'sidebar-item-pin';
          pinBtn.innerHTML = `
            <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="${note.pinned ? 'currentColor' : 'none'}" stroke-linecap="round" stroke-linejoin="round" style="width: 12px; height: 12px;">
              <line x1="12" y1="17" x2="12" y2="22"></line>
              <path d="M5 17h14v-1.76a2 2 0 0 0-.44-1.24l-2.78-3.47A2 2 0 0 1 15 9.3V5a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4.3a2 2 0 0 1-.78 1.23l-2.78 3.5a2 2 0 0 0-.44 1.24z"></path>
            </svg>
          `;
          if (note.pinned) {
            pinBtn.classList.add('pinned');
            pinBtn.setAttribute('title', 'ピン留めを解除');
          } else {
            pinBtn.setAttribute('title', 'ピン留めする');
          }
          pinBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            togglePinNote(note.id);
          });

          const renameBtn = document.createElement('button');
          renameBtn.className = 'sidebar-item-rename';
          renameBtn.innerHTML = `
            <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="width: 12px; height: 12px;">
              <path d="M12 20h9"></path>
              <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
            </svg>
          `;
          renameBtn.setAttribute('title', '名前を変更');
          renameBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            renameNote(note.id);
          });

          const delBtn = document.createElement('button');
          delBtn.className = 'sidebar-item-delete';
          delBtn.innerHTML = '×';
          delBtn.setAttribute('title', 'メモを削除');
          delBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            deleteNote(note.id);
          });

          item.appendChild(pinBtn);
          item.appendChild(renameBtn);
          item.appendChild(delBtn);
        }

        listEl.appendChild(item);
      });
    }

    async function togglePinNote(id) {
      const note = state.notesList.find(n => n.id === id);
      if (note) {
        note.pinned = !note.pinned;
        await saveNotesListToStorage();
        renderSidebarList();
      }
    }

    function toggleEditMode() {
      isEditMode = !isEditMode;
      const editBtn = document.getElementById('sidebar-edit-btn');
      const footer = document.getElementById('sidebar-footer');
      
      if (isEditMode) {
        editBtn.classList.add('active');
        editBtn.innerText = 'キャンセル';
        footer.style.display = 'flex';
        selectedNoteIds.clear();
        updateBulkDeleteButton();
      } else {
        editBtn.classList.remove('active');
        editBtn.innerText = '選択削除';
        footer.style.display = 'none';
        selectedNoteIds.clear();
      }
      renderSidebarList();
    }

    function updateBulkDeleteButton() {
      const deleteBtn = document.getElementById('bulk-delete-btn');
      if (deleteBtn) {
        const count = selectedNoteIds.size;
        deleteBtn.innerText = `選択したメモを削除 (${count})`;
        deleteBtn.disabled = count === 0;
      }
    }

    async function deleteSelectedNotes() {
      const count = selectedNoteIds.size;
      if (count === 0) return;

      if (!confirm(`選択した ${count} 件のメモを削除しますか？`)) return;

      const remainingNotes = state.notesList.filter(n => !selectedNoteIds.has(n.id));
      const allDeleted = remainingNotes.length === 0;

      for (const id of selectedNoteIds) {
        if (db) {
          await deleteDBValue('note_' + id);
        } else {
          localStorage.removeItem('note_' + id);
        }
      }

      if (allDeleted) {
        const newId = Date.now().toString();
        const newNote = {
          id: newId,
          title: getTimestampString(),
          updatedAt: Date.now()
        };
        state.notesList = [newNote];
        state.currentNoteId = newId;

        if (db) {
          await setDBValue('note_' + newId, '');
        } else {
          localStorage.setItem('note_' + newId, '');
        }
        
        await saveNotesListToStorage();
        await saveCurrentNoteIdToStorage();

        editor.innerHTML = '';
      } else {
        state.notesList = remainingNotes;
        await saveNotesListToStorage();

        if (selectedNoteIds.has(state.currentNoteId)) {
          state.currentNoteId = state.notesList[0].id;
          await saveCurrentNoteIdToStorage();
          
          let noteContent = null;
          if (db) {
            noteContent = await getDBValue('note_' + state.currentNoteId);
          } else {
            noteContent = localStorage.getItem('note_' + state.currentNoteId);
          }
          editor.innerHTML = noteContent || '';
          editor.querySelectorAll('.image-block').forEach(imgBlock => {
            imgBlock.draggable = true;
          });
        }
      }

      toggleEditMode();
      updateStats();
      showToast(`${count} 件のメモを削除しました`);
    }

    async function renameNote(id) {
      const note = state.notesList.find(n => n.id === id);
      if (!note) return;

      const newTitle = prompt("新しいタイトルを入力してください:", note.title);
      if (newTitle === null) return;

      const trimmedTitle = newTitle.trim().substring(0, 30);
      if (trimmedTitle.length === 0) {
        showToast("タイトルを入力してください");
        return;
      }

      note.title = trimmedTitle;
      note.isCustomTitle = true;
      note.updatedAt = Date.now();

      await saveNotesListToStorage();
      renderSidebarList();
      showToast("タイトルを変更しました");
    }

    function getTimestampString() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const ss = String(now.getSeconds()).padStart(2, '0');
      return `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
    }

    async function createNewNote() {
      const id = Date.now().toString();
      const newNote = {
        id: id,
        title: getTimestampString(),
        updatedAt: Date.now()
      };

      state.notesList.push(newNote);
      state.currentNoteId = id;

      editor.innerHTML = '';

      await saveNotesListToStorage();
      await saveCurrentNoteIdToStorage();
      await saveContent();

      renderSidebarList();
      updateStats();
      editor.focus();
      closeSidebar();
    }

    async function loadNote(id) {
      if (state.currentNoteId === id) return;

      await saveContent();

      state.currentNoteId = id;
      await saveCurrentNoteIdToStorage();

      let noteContent = null;
      if (db) {
        noteContent = await getDBValue('note_' + id);
      } else {
        noteContent = localStorage.getItem('note_' + id);
      }

      editor.innerHTML = noteContent || '';
      
      editor.querySelectorAll('.image-block').forEach(imgBlock => {
        imgBlock.draggable = true;
      });

      renderSidebarList();
      updateStats();
      editor.focus();
    }

    async function deleteNote(id) {
      if (!confirm("このメモを削除しますか？")) return;

      selectedNoteIds.delete(id);

      const isLastNote = state.notesList.length <= 1;

      state.notesList = state.notesList.filter(n => n.id !== id);

      if (db) {
        await deleteDBValue('note_' + id);
      } else {
        localStorage.removeItem('note_' + id);
      }

      if (isLastNote) {
        const newId = Date.now().toString();
        const newNote = {
          id: newId,
          title: getTimestampString(),
          updatedAt: Date.now()
        };
        state.notesList = [newNote];
        state.currentNoteId = newId;

        if (db) {
          await setDBValue('note_' + newId, '');
        } else {
          localStorage.setItem('note_' + newId, '');
        }
        
        await saveNotesListToStorage();
        await saveCurrentNoteIdToStorage();

        editor.innerHTML = '';
      } else {
        await saveNotesListToStorage();

        if (state.currentNoteId === id) {
          state.currentNoteId = state.notesList[0].id;
          await saveCurrentNoteIdToStorage();
          
          let noteContent = null;
          if (db) {
            noteContent = await getDBValue('note_' + state.currentNoteId);
          } else {
            noteContent = localStorage.getItem('note_' + state.currentNoteId);
          }
          editor.innerHTML = noteContent || '';
          editor.querySelectorAll('.image-block').forEach(imgBlock => {
            imgBlock.draggable = true;
          });
        }
      }

      renderSidebarList();
      updateStats();
      showToast("メモを削除しました");
    }

    // Debounce database writing to minimize overhead on fast typing
    const saveContentDebounced = debounce(saveContent, 300);

    function applyAllStyles() {
      // Themes
      document.body.setAttribute('data-theme', state.theme);

      // Layout Width Mode (Always Full Screen)
      document.body.setAttribute('data-width-mode', 'full');
      
      // Font face
      let fontStack = 'var(--font-sans)';
      if (state.font === 'serif') fontStack = 'var(--font-serif)';
      if (state.font === 'mono') fontStack = 'var(--font-mono)';
      document.documentElement.style.setProperty('--current-font-family', fontStack);
      
      // Font size
      document.documentElement.style.setProperty('--current-font-size', state.fontSize + 'px');
      
      // Line height
      document.documentElement.style.setProperty('--current-line-height', state.lineHeight);

      // Update configuration variables inside HTML (for self serialization)
      appConfig.dataset.savedTheme = state.theme;
      appConfig.dataset.savedFont = state.font;
      appConfig.dataset.savedSize = state.fontSize + 'px';
      appConfig.dataset.savedHeight = state.lineHeight;
      appConfig.dataset.savedWidth = state.fullWidth;

      // Update active dropdown items visual cues
      document.querySelectorAll('#font-dropdown-container .dropdown-item').forEach((item, idx) => {
        const fonts = ['sans', 'serif', 'mono'];
        item.classList.toggle('active', state.font === fonts[idx]);
      });

      // Pin class updates & toggle chevron arrow rotation
      const chevron = document.getElementById('toggle-chevron');
      const toggle = document.getElementById('toolbar-toggle');
      const infoBtn = document.getElementById('info-btn');
      const menuBtn = document.getElementById('menu-toggle');
      if (!state.toolbarPinned) {
        toolbarWrapper.classList.add('hidden');
        if (infoBtn) infoBtn.classList.add('hidden');
        if (menuBtn) menuBtn.classList.add('hidden');
        if (chevron) chevron.style.transform = 'rotate(180deg)';
        if (toggle) toggle.setAttribute('title', "ツールバーを表示");
      } else {
        toolbarWrapper.classList.remove('hidden');
        if (infoBtn) infoBtn.classList.remove('hidden');
        if (menuBtn) menuBtn.classList.remove('hidden');
        if (chevron) chevron.style.transform = 'rotate(0deg)';
        if (toggle) toggle.setAttribute('title', "ツールバーを隠す");
      }

      // Update active line height dropdown item visual cues
      document.querySelectorAll('#lh-dropdown-container .dropdown-item').forEach((item) => {
        const valAttr = item.getAttribute('onclick');
        if (valAttr) {
          const match = valAttr.match(/setLineHeight\(([^)]+)\)/);
          if (match) {
            const val = parseFloat(match[1]);
            item.classList.toggle('active', Math.abs(state.lineHeight - val) < 0.01);
          }
        }
      });

      // Update active theme dropdown item visual cues
      document.querySelectorAll('#theme-dropdown-container .dropdown-item').forEach((item) => {
        const valAttr = item.getAttribute('onclick');
        if (valAttr) {
          const match = valAttr.match(/setTheme\('([^']+)'\)/);
          if (match) {
            item.classList.toggle('active', state.theme === match[1]);
          }
        }
      });
    }

    // --- Styling Functions ---
    function setTheme(themeName) {
      state.theme = themeName;
      applyAllStyles();
      saveConfigToStorage();
    }

    function setFont(fontName) {
      state.font = fontName;
      applyAllStyles();
      saveConfigToStorage();
      closeAllDropdowns();
    }

    function adjustFontSize(delta) {
      state.fontSize = Math.max(12, Math.min(64, state.fontSize + delta));
      applyAllStyles();
      saveConfigToStorage();
      showToast(`サイズ: ${state.fontSize}px`);
    }

    function setLineHeight(val) {
      state.lineHeight = parseFloat(val);
      applyAllStyles();
      saveConfigToStorage();
      closeAllDropdowns();
    }

    function toggleBold() {
      document.execCommand('bold', false, null);
      editor.focus();
    }

    // --- Dropdowns ---
    function setupDropdowns() {
      const dropBtn = document.querySelectorAll('.dropdown-container .tool-btn');
      dropBtn.forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const container = btn.parentElement;
          const isOpen = container.classList.contains('open');
          closeAllDropdowns();
          if (!isOpen) {
            container.classList.add('open');
          }
        });
      });
      window.addEventListener('click', closeAllDropdowns);
    }

    function closeAllDropdowns() {
      document.querySelectorAll('.dropdown-container').forEach(c => c.classList.remove('open'));
    }

    // --- Auto-Hide & Pin Toolbar ---
    function toggleToolbarPin() {
      state.toolbarPinned = !state.toolbarPinned;
      applyAllStyles();
      saveConfigToStorage();
      showToast(state.toolbarPinned ? "ツールバーを固定しました" : "オートハイドを有効にしました");
    }

    function handleToolbarHoverTrigger(e) {
      if (state.toolbarPinned) return;
      
      const infoBtn = document.getElementById('info-btn');
      const menuBtn = document.getElementById('menu-toggle');
      // Reveal toolbar when mouse is near the top (top 45px)
      if (e.clientY < 45) {
        toolbarWrapper.classList.remove('hidden');
        if (infoBtn) infoBtn.classList.remove('hidden');
        if (menuBtn) menuBtn.classList.remove('hidden');
      } else {
        // Hide it if we are not hovering elements inside it
        if (!toolbarWrapper.contains(e.target) && !e.target.classList.contains('toolbar-toggle-handle')) {
          toolbarWrapper.classList.add('hidden');
          if (infoBtn) infoBtn.classList.add('hidden');
          if (menuBtn) menuBtn.classList.add('hidden');
        }
      }
    }

    // --- Pasting and Handling Images ---
    function handleImagePaste(e) {
      const items = (e.clipboardData || e.originalEvent.clipboardData).items;
      for (const item of items) {
        if (item.type.indexOf('image') === 0) {
          e.preventDefault();
          const blob = item.getAsFile();
          const reader = new FileReader();
          reader.onload = function(evt) {
            insertImageBlock(evt.target.result);
          };
          reader.readAsDataURL(blob);
          break; // only process the first image pasted
        }
      }
    }

    // --- Image Insertion & Resizing / Comments ---
    function insertImageBlock(base64Src) {
      // Focus editor if not focused
      editor.focus();

      // Create a gorgeous block with comment section
      const imgBlock = document.createElement('div');
      imgBlock.className = 'image-block align-center'; // Default center
      imgBlock.contentEditable = 'false';
      imgBlock.draggable = true; // Enable HTML5 draggable
      imgBlock.dataset.align = 'center';

      const imgEl = document.createElement('img');
      imgEl.src = base64Src;
      imgEl.alt = 'Pasted Image';
      
      const commentEl = document.createElement('div');
      commentEl.className = 'image-comment';
      commentEl.contentEditable = 'true';

      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.innerText = '×';
      delBtn.setAttribute('title', '画像を削除');

      // Create Alignment Controls Overlay
      const controls = document.createElement('div');
      controls.className = 'image-controls';

      const btnLeft = document.createElement('button');
      btnLeft.className = 'control-btn align-left-btn';
      btnLeft.innerHTML = '◀';
      btnLeft.dataset.align = 'left';
      btnLeft.setAttribute('title', '左寄せ（テキスト回り込み）');

      const btnCenter = document.createElement('button');
      btnCenter.className = 'control-btn align-center-btn active';
      btnCenter.innerHTML = '■';
      btnCenter.dataset.align = 'center';
      btnCenter.setAttribute('title', '中央寄せ');

      const btnRight = document.createElement('button');
      btnRight.className = 'control-btn align-right-btn';
      btnRight.innerHTML = '▶';
      btnRight.dataset.align = 'right';
      btnRight.setAttribute('title', '右寄せ（テキスト回り込み）');

      controls.appendChild(btnLeft);
      controls.appendChild(btnCenter);
      controls.appendChild(btnRight);

      const resizeHandle = document.createElement('div');
      resizeHandle.className = 'image-resize-handle';

      imgBlock.appendChild(imgEl);
      imgBlock.appendChild(commentEl);
      imgBlock.appendChild(delBtn);
      imgBlock.appendChild(controls);
      imgBlock.appendChild(resizeHandle);

      // Insert at current cursor selection
      const sel = window.getSelection();
      if (sel.rangeCount > 0) {
        const range = sel.getRangeAt(0);
        range.insertNode(imgBlock);
        
        // Move selection after the block
        range.collapse(false);
        const nextNode = imgBlock.nextSibling;
        if (!nextNode) {
          // If no siblings, insert an empty spacer text node to enable clean continuation
          const spacer = document.createTextNode('\u00A0');
          editor.appendChild(spacer);
          range.setStartAfter(imgBlock);
          range.collapse(true);
        }
        sel.removeAllRanges();
        sel.addRange(range);
      } else {
        editor.appendChild(imgBlock);
      }
      
      saveContentDebounced();
      updateStats();
    }

    // --- Interactive custom buttons ---
    function openButtonModal() {
      document.getElementById('button-modal').classList.add('open');
      document.getElementById('btn-label').focus();
    }

    function closeButtonModal() {
      document.getElementById('button-modal').classList.remove('open');
      // Reset inputs
      document.getElementById('btn-label').value = '';
      document.getElementById('btn-value').value = '';
    }

    function toggleActionInputHint() {
      const action = document.getElementById('btn-action').value;
      const label = document.getElementById('btn-value-label');
      const input = document.getElementById('btn-value');

      if (action === 'copy') {
        label.innerText = 'コピーするテキスト';
        input.placeholder = '例: user@example.com';
      } else if (action === 'insert') {
        label.innerText = '挿入する定型文';
        input.placeholder = '例: お疲れ様です、〇〇です。';
      } else if (action === 'link') {
        label.innerText = 'リンク先 URL';
        input.placeholder = '例: https://google.com';
      }
    }

    function createCustomButton() {
      const label = document.getElementById('btn-label').value.trim();
      const action = document.getElementById('btn-action').value;
      const value = document.getElementById('btn-value').value.trim();

      if (!label || !value) {
        alert('ボタンの文字と内容を入力してください。');
        return;
      }

      insertCustomButtonElement(label, action, value);
      closeButtonModal();
    }

    function insertCustomButtonElement(label, action, value) {
      editor.focus();

      const btnWrapper = document.createElement('span');
      btnWrapper.className = 'btn-wrapper';
      btnWrapper.contentEditable = 'false';

      const btn = document.createElement('button');
      btn.className = 'custom-action-btn';
      btn.dataset.action = action;
      btn.dataset.value = value;
      btn.innerText = label;
      btn.addEventListener('click', (e) => {
        handleCustomButtonClick(btn);
      });

      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.innerText = '×';
      delBtn.addEventListener('click', () => {
        btnWrapper.remove();
        saveContentDebounced();
      });

      btnWrapper.appendChild(btn);
      btnWrapper.appendChild(delBtn);

      const sel = window.getSelection();
      if (sel.rangeCount > 0) {
        const range = sel.getRangeAt(0);
        range.insertNode(btnWrapper);
        range.collapse(false);
        
        // Add single space after button for clean editing flow
        const space = document.createTextNode('\u00A0');
        range.insertNode(space);
        range.collapse(false);
        
        sel.removeAllRanges();
        sel.addRange(range);
      } else {
        editor.appendChild(btnWrapper);
      }
      
      saveContentDebounced();
    }

    // Attach click triggers to existing static custom buttons during boot
    document.querySelectorAll('.custom-action-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        handleCustomButtonClick(btn);
      });
      // Also ensure parent delBtn is attached if exists
      const parent = btn.parentElement;
      if (parent && parent.className === 'btn-wrapper') {
        const del = parent.querySelector('.delete-btn');
        if (del) {
          del.addEventListener('click', () => {
            parent.remove();
            saveContentDebounced();
          });
        }
      }
    });

    function handleCustomButtonClick(btn) {
      const action = btn.dataset.action;
      const val = btn.dataset.value;

      if (action === 'copy') {
        navigator.clipboard.writeText(val).then(() => {
          showToast(`「${val}」をコピーしました`);
        }).catch(err => {
          console.error("Clipboard copy failed: ", err);
        });
      } else if (action === 'insert') {
        // Insert inline text at cursor inside editor
        editor.focus();
        const sel = window.getSelection();
        if (sel.rangeCount > 0) {
          const range = sel.getRangeAt(0);
          range.deleteContents();
          
          // Re-evaluate if variables inside value (like date templates)
          let finalVal = val;
          if (val === '%date%') {
            finalVal = new Date().toLocaleDateString('ja-JP');
          } else if (val === '%time%') {
            finalVal = new Date().toLocaleTimeString('ja-JP', {hour: '2-digit', minute:'2-digit'});
          } else if (val === '%datetime%') {
            finalVal = new Date().toLocaleString('ja-JP');
          }

          const txtNode = document.createTextNode(finalVal);
          range.insertNode(txtNode);
          
          // Place cursor after inserted text
          range.setStartAfter(txtNode);
          range.collapse(true);
          sel.removeAllRanges();
          sel.addRange(range);
        }
        saveContentDebounced();
        updateStats();
      } else if (action === 'link') {
        window.open(val, '_blank');
      }
    }

    // --- Web Speech API (Voice Input) ---
    function toggleVoiceInput() {
      if (isRecording) {
        stopVoiceInput();
        return;
      }
      
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        alert("お使いのブラウザは音声入力をサポートしていません。Chrome、Safari、またはEdgeでお試しください。");
        return;
      }

      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = false;
      recognition.lang = 'ja-JP';

      recognition.onstart = () => {
        isRecording = true;
        voicePulse.style.display = 'block';
        voiceBtn.classList.add('active');
        showToast("音声入力中... 話してください");
      };

      recognition.onerror = (e) => {
        console.error(e);
        stopVoiceInput();
        showToast("音声入力エラーが発生しました");
      };

      recognition.onend = () => {
        stopVoiceInput();
      };

      recognition.onresult = (event) => {
        let textResult = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            textResult += event.results[i][0].transcript;
          }
        }
        
        if (textResult) {
          insertVoiceText(textResult);
        }
      };

      recognition.start();
    }

    function stopVoiceInput() {
      if (recognition) {
        recognition.stop();
      }
      isRecording = false;
      voicePulse.style.display = 'none';
      voiceBtn.classList.remove('active');
      showToast("音声入力を停止しました");
    }

    function insertVoiceText(text) {
      editor.focus();
      const sel = window.getSelection();
      if (sel.rangeCount > 0) {
        const range = sel.getRangeAt(0);
        range.deleteContents();
        const textNode = document.createTextNode(text + " ");
        range.insertNode(textNode);
        
        // Move selection to end
        range.setStartAfter(textNode);
        range.collapse(true);
        sel.removeAllRanges();
        sel.addRange(range);
      } else {
        editor.appendChild(document.createTextNode(text + " "));
      }
      saveContentDebounced();
      updateStats();
    }

    // --- Keybindings Manager ---
    function setupKeybinds() {
      window.addEventListener('keydown', (e) => {
        // Alt + Plus: Increase Text
        if (e.altKey && (e.key === '+' || e.key === '=')) {
          e.preventDefault();
          adjustFontSize(2);
        }
        // Alt + Minus: Decrease Text
        if (e.altKey && e.key === '-') {
          e.preventDefault();
          adjustFontSize(-2);
        }
        // Alt + V: Speech Recognition Toggle
        if (e.altKey && (e.key === 'v' || e.key === 'V' || e.key === 'r' || e.key === 'R')) {
          e.preventDefault();
          toggleVoiceInput();
        }
      });
    }

    // --- Markdown Auto-Format Assist ---
    function setupMarkdownAutoFormat() {
      editor.addEventListener('input', (e) => {
        if (e.inputType !== 'insertText') return;

        const sel = window.getSelection();
        if (!sel.rangeCount) return;
        const range = sel.getRangeAt(0);
        const node = range.startContainer;
        
        if (node.nodeType !== Node.TEXT_NODE) return;

        const text = node.textContent;
        const caretOffset = range.startOffset;
        const textBeforeCaret = text.substring(0, caretOffset);

        let blockParent = node.parentElement;
        while (blockParent && blockParent !== editor && blockParent.style.display !== 'block' && blockParent.tagName !== 'DIV' && blockParent.tagName !== 'P' && blockParent.tagName !== 'LI' && !/^H[1-6]$/.test(blockParent.tagName)) {
          blockParent = blockParent.parentElement;
        }

        if (!blockParent || blockParent === editor) return;

        let formatType = null;
        let patternLength = 0;

        if (textBeforeCaret.startsWith('# ')) {
          formatType = 'h1';
          patternLength = 2;
        } else if (textBeforeCaret.startsWith('## ')) {
          formatType = 'h2';
          patternLength = 3;
        } else if (textBeforeCaret.startsWith('### ')) {
          formatType = 'h3';
          patternLength = 4;
        } else if (textBeforeCaret.startsWith('- ')) {
          formatType = 'li';
          patternLength = 2;
        }

        if (formatType) {
          const remainingText = text.substring(patternLength);
          node.textContent = remainingText;

          if (formatType === 'li') {
            const ul = document.createElement('ul');
            const li = document.createElement('li');
            li.innerHTML = remainingText || '<br>';
            ul.appendChild(li);
            
            blockParent.parentElement.replaceChild(ul, blockParent);
            
            const newRange = document.createRange();
            newRange.selectNodeContents(li);
            newRange.collapse(true);
            sel.removeAllRanges();
            sel.addRange(newRange);
          } else {
            const heading = document.createElement(formatType);
            heading.innerHTML = remainingText || '<br>';
            
            blockParent.parentElement.replaceChild(heading, blockParent);

            const newRange = document.createRange();
            newRange.selectNodeContents(heading);
            newRange.collapse(true);
            sel.removeAllRanges();
            sel.addRange(newRange);
          }
          
          saveContentDebounced();
        }
      });
    }

    // --- Toast Notifications ---
    function showToast(message) {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toast-message');
      
      toastMsg.innerText = message;
      toast.classList.add('show');
      
      // Clear previous timeout if exists
      if (window.toastTimeout) {
        clearTimeout(window.toastTimeout);
      }
      
      window.toastTimeout = setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }

    // --- Document Reset ---
    async function confirmReset() {
      if (confirm("全ての入力内容、画像、および設定を完全に消去しますか？")) {
        editor.innerHTML = '';
        state = {
          theme: 'carbon',
          font: 'sans',
