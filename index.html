    // --- Word & Character Stats ---
    function updateStats() {
      let text = (editor.innerText || '').replace(/\u200B/g, '');
      
      // If visually empty (no text content and no images), force 0
      if (!editor.textContent.trim() && !editor.querySelector('img')) {
        document.getElementById('char-count').innerText = "文字数: 0";
        document.getElementById('word-count').innerText = "単語数: 0";
        return;
      }

      // Chrome adds a trailing newline in contenteditable innerText, strip it
      if (text.endsWith('\n')) {
        text = text.slice(0, -1);
      }
      
      const charCount = text.length;
      const cleanText = text.trim().replace(/\s+/g, ' ');
      const wordCount = cleanText ? cleanText.split(/\s+/).length : 0;
      
      document.getElementById('char-count').innerText = `文字数: ${charCount}`;
      document.getElementById('word-count').innerText = `単語数: ${wordCount}`;
    }

    // --- Help Modal Handles ---
    function openHelpModal() {
      document.getElementById('help-modal').classList.add('open');
    }

    function closeHelpModal() {
      document.getElementById('help-modal').classList.remove('open');
    }

    // --- Self-packaged HTML Serialization (TiddlyWiki-style Saving) ---
    function downloadSelf() {
      // Read current full DOM source code
      const currentHTML = editor.innerHTML;
      
      // We search for the baked content position or replace/inject it clean
      // Let's create a perfect fresh file contents string by getting raw source and baking the template:
      fetch(window.location.href)
        .then(response => {
          if (!response.ok) throw new Error();
          return response.text();
        })
        .catch(() => {
          // Fallback if running offline as raw file without server
          return document.documentElement.outerHTML;
        })
        .then(source => {
          // Replace config states in dataset to bake current preferences
          let bakedSource = source;
          
          // Regex replacements for configuration defaults so that they boot with current styling defaults
          bakedSource = bakedSource.replace(/data-saved-theme="[^"]*"/, `data-saved-theme="${state.theme}"`);
          bakedSource = bakedSource.replace(/data-saved-font="[^"]*"/, `data-saved-font="${state.font}"`);
          bakedSource = bakedSource.replace(/data-saved-size="[^"]*"/, `data-saved-size="${state.fontSize}px"`);
          bakedSource = bakedSource.replace(/data-saved-height="[^"]*"/, `data-saved-height="${state.lineHeight}"`);
          bakedSource = bakedSource.replace(/data-saved-bold="[^"]*"/, `data-saved-bold="${state.bold}"`);

          // Inject current innerHTML into the editor slot
          const editorSearch = /<div class="editor" id="editor"[^>]*>([\s\S]*?)<\/div>/;
          bakedSource = bakedSource.replace(editorSearch, `<div class="editor" id="editor" contenteditable="true" spellcheck="false">${currentHTML}</div>`);

          // package into downloadable Blob
          const blob = new Blob([bakedSource], { type: 'text/html;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          
          const a = document.createElement('a');
          a.href = url;
          a.download = `brnote_${new Date().toISOString().slice(0,10)}.html`;
          document.body.appendChild(a);
          a.click();
          
          setTimeout(() => {
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
          }, 0);
          
          showToast("ファイルがダウンロードされました！");
        });
    }


    // --- Toggle Full-Screen Wide Width Layout ---
    function toggleWidthMode() {
      state.fullWidth = !state.fullWidth;
      applyAllStyles();
      saveConfigToStorage();
      showToast(state.fullWidth ? "全画面表示に切り替えました" : "標準表示に切り替えました");

    // --- Insert Columns Row Layout ---
    function insertColumnRow() {
      editor.focus();
      
      const row = document.createElement('div');
      row.className = 'column-row';
      row.contentEditable = 'false';
      
      const leftCol = document.createElement('div');
      leftCol.className = 'column-cell';
      leftCol.contentEditable = 'true';
      leftCol.style.width = '50%';
      leftCol.setAttribute('data-placeholder', '左カラム (入力・ペースト可)...');
      leftCol.addEventListener('input', () => {
        saveContentDebounced();
        updateStats();
      });
      
      const divider = document.createElement('div');
      divider.className = 'column-divider';
      
      const rightCol = document.createElement('div');
      rightCol.className = 'column-cell';
      rightCol.contentEditable = 'true';
      rightCol.style.width = '50%';
      rightCol.setAttribute('data-placeholder', '右カラム (入力・ペースト可)...');
      rightCol.addEventListener('input', () => {
        saveContentDebounced();
        updateStats();
      });
      
      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.innerText = '×';
      delBtn.addEventListener('click', () => {
        row.remove();
        saveContentDebounced();
        updateStats();
      });
      
      row.appendChild(leftCol);
      row.appendChild(divider);
      row.appendChild(rightCol);
      row.appendChild(delBtn);
      
      // Insert at selection
      const sel = window.getSelection();
      if (sel.rangeCount > 0) {
        const range = sel.getRangeAt(0);
        range.insertNode(row);
        range.collapse(false);
        
        // Add single spacer sibling to enable clean typing below row
        const spacer = document.createTextNode('\u00A0');
        editor.appendChild(spacer);
        range.setStartAfter(row);
        range.collapse(true);
        sel.removeAllRanges();
        sel.addRange(range);
      } else {
        editor.appendChild(row);
      }
      
      saveContentDebounced();
      updateStats();
      showToast("2列カラムを挿入しました");
    }

    // --- Drag-to-Resize Column & Image Drag Handlers ---
    function setupResizeAndDividerListeners() {
      const handleStart = (clientX, target, isTouch) => {
        // 1. Column split divider resizing
        if (target.classList.contains('column-divider')) {
          const divider = target;
          const row = divider.closest('.column-row');
          const leftCell = divider.previousElementSibling;
          const rightCell = divider.nextElementSibling;
          
          const startX = clientX;
          const leftStartWidth = leftCell.getBoundingClientRect().width;
          const rightStartWidth = rightCell.getBoundingClientRect().width;
          const totalWidth = row.getBoundingClientRect().width;
          
          const onMove = (currentX) => {
            const deltaX = currentX - startX;
            const leftNewWidth = leftStartWidth + deltaX;
            const rightNewWidth = rightStartWidth - deltaX;
            
            if (leftNewWidth > 50 && rightNewWidth > 50) {
              const leftPercent = (leftNewWidth / totalWidth) * 100;
              const rightPercent = (rightNewWidth / totalWidth) * 100;
              leftCell.style.width = `${leftPercent}%`;
              rightCell.style.width = `${rightPercent}%`;
            }
          };

          if (isTouch) {
            const onTouchMove = (moveEvent) => {
              onMove(moveEvent.touches[0].clientX);
            };
            const onTouchEnd = () => {
              document.removeEventListener('touchmove', onTouchMove);
              document.removeEventListener('touchend', onTouchEnd);
              saveContentDebounced();
            };
            document.addEventListener('touchmove', onTouchMove, { passive: true });
            document.addEventListener('touchend', onTouchEnd);
          } else {
            const onMouseMove = (moveEvent) => {
              onMove(moveEvent.clientX);
            };
            const onMouseUp = () => {
              document.removeEventListener('mousemove', onMouseMove);
              document.removeEventListener('mouseup', onMouseUp);
              saveContentDebounced();
            };
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
          }
        }
        
        // 2. Image block bottom-right corner resizing
        if (target.classList.contains('image-resize-handle')) {
          const handle = target;
          const imgBlock = handle.closest('.image-block');
          
          const startX = clientX;
          const startWidth = imgBlock.getBoundingClientRect().width;
          const parentWidth = imgBlock.parentElement.getBoundingClientRect().width;
          
          const onMove = (currentX) => {
            const deltaX = currentX - startX;
            const newWidth = Math.max(80, Math.min(parentWidth, startWidth + deltaX));
            imgBlock.style.width = `${newWidth}px`;
          };

          if (isTouch) {
            const onTouchMove = (moveEvent) => {
              onMove(moveEvent.touches[0].clientX);
            };
            const onTouchEnd = () => {
              document.removeEventListener('touchmove', onTouchMove);
              document.removeEventListener('touchend', onTouchEnd);
              saveContentDebounced();
            };
            document.addEventListener('touchmove', onTouchMove, { passive: true });
            document.addEventListener('touchend', onTouchEnd);
          } else {
            const onMouseMove = (moveEvent) => {
              onMove(moveEvent.clientX);
            };
            const onMouseUp = () => {
              document.removeEventListener('mousemove', onMouseMove);
              document.removeEventListener('mouseup', onMouseUp);
              saveContentDebounced();
            };
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
          }
        }
      };

      document.addEventListener('mousedown', (e) => {
        if (e.target.classList.contains('column-divider') || e.target.classList.contains('image-resize-handle')) {
          e.preventDefault();
          handleStart(e.clientX, e.target, false);
        }
      });

      document.addEventListener('touchstart', (e) => {
        if (e.target.classList.contains('column-divider') || e.target.classList.contains('image-resize-handle')) {
          e.preventDefault();
          handleStart(e.touches[0].clientX, e.target, true);
        }
      }, { passive: false });

      // 3. Delegate key and comment edits inside sub-cards to trigger db saves
      editor.addEventListener('input', (e) => {
        if (e.target.classList.contains('image-comment')) {
          saveContentDebounced();
        }
      });

      // 4. Global click delegates (custom buttons, delete, image alignments)
      document.addEventListener('click', (e) => {
        // A. Custom action buttons
        const actionBtn = e.target.closest('.custom-action-btn');
        if (actionBtn) {
          e.stopPropagation();
          handleCustomButtonClick(actionBtn);
          return;
        }

        // B. Image Block delete button
        const delBtn = e.target.closest('.image-block > .delete-btn');
        if (delBtn) {
          e.stopPropagation();
          const imgBlock = delBtn.closest('.image-block');
          if (imgBlock) {
            imgBlock.remove();
            saveContentDebounced();
            updateStats();
          }
          return;
        }

        // C. Image alignment buttons
        const controlBtn = e.target.closest('.image-controls > .control-btn');
        if (controlBtn) {
          e.stopPropagation();
          const imgBlock = controlBtn.closest('.image-block');
          const align = controlBtn.dataset.align;
          
          if (imgBlock && align) {
            // Remove previous alignment classes
            imgBlock.classList.remove('align-left', 'align-center', 'align-right');
            // Add new alignment class
            imgBlock.classList.add(`align-${align}`);
            imgBlock.dataset.align = align;

            // Update active state in UI
            const controls = controlBtn.parentElement;
            controls.querySelectorAll('.control-btn').forEach(btn => {
              btn.classList.toggle('active', btn === controlBtn);
            });

            saveContentDebounced();
          }
          return;
        }
      });

      // 5. Image Drag & Drop Reordering Logic
      editor.addEventListener('dragstart', (e) => {
        const imgBlock = e.target.closest('.image-block');
        if (imgBlock) {
          e.dataTransfer.setData('text/plain', ''); // Firefox support
          state.draggedBlock = imgBlock;
          imgBlock.style.opacity = '0.5';
        }
      });

      editor.addEventListener('dragend', (e) => {
        const imgBlock = e.target.closest('.image-block');
        if (imgBlock) {
          imgBlock.style.opacity = '1.0';
        }
      });

      editor.addEventListener('dragover', (e) => {
        const isFileDrag = e.dataTransfer.types.includes('Files');
        if (state.draggedBlock || isFileDrag) {
          e.preventDefault(); // Enable drop
        }
      });

      editor.addEventListener('drop', (e) => {
        const files = e.dataTransfer.files;
        if (files && files.length > 0) {
          // A. Handle file drops (drag and drop from local system)
          e.preventDefault();
          
          let range = null;
          if (document.caretRangeFromPoint) {
            range = document.caretRangeFromPoint(e.clientX, e.clientY);
          } else if (e.rangeParent) {
            range = document.createRange();
            range.setStart(e.rangeParent, e.rangeOffset);
            range.collapse(true);
          }
          
          if (range) {
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
          }

          for (const file of files) {
            if (file.type.startsWith('image/')) {
              const reader = new FileReader();
              reader.onload = (evt) => {
                insertImageBlock(evt.target.result);
              };
              reader.readAsDataURL(file);
              break; // Process only the first image dropped
            }
          }
        } else if (state.draggedBlock) {
          // B. Handle internal image blocks reordering drag-and-drop
          e.preventDefault();
          
          let range = null;
          if (document.caretRangeFromPoint) {
            range = document.caretRangeFromPoint(e.clientX, e.clientY);
          } else if (e.rangeParent) {
            range = document.createRange();
            range.setStart(e.rangeParent, e.rangeOffset);
            range.collapse(true);
          }
          
          if (range) {
            const dropTarget = range.startContainer.parentElement;
            // Prevent drop inside a comment block or drop outside the editor
            if (dropTarget && !dropTarget.closest('.image-comment') && editor.contains(dropTarget)) {
              range.insertNode(state.draggedBlock);
              state.draggedBlock.style.opacity = '1.0';
              state.draggedBlock = null;
              saveContentDebounced();
            }
          }
        }
      });
    }

    // --- Copy Editor Raw Text to Clipboard ---
    function copyAllText() {
      const text = editor.innerText || "";
      
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => {
          showToast("すべてのテキストをコピーしました");
        }).catch(() => {
          fallbackCopyText(text);
        });
      } else {
        fallbackCopyText(text);
      }
    }

    function fallbackCopyText(text) {
      try {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.top = "0";
        textArea.style.left = "0";
        textArea.style.opacity = "0";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        
        const successful = document.execCommand('copy');
        document.body.removeChild(textArea);
        
        if (successful) {
          showToast("すべてのテキストをコピーしました");
        } else {
          showToast("コピーできませんでした");
        }
      } catch (err) {
        console.error("Fallback copy failed:", err);
        showToast("コピーできませんでした");
      }
    }

    // --- Download Editor Content as plain text (.txt) ---
    function downloadAsText() {
      const text = editor.innerText || "";
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      triggerFileDownload(blob, `brnote_${new Date().toISOString().slice(0,10)}.txt`);
    }

    // --- Download Editor Content as clean Markdown (.md) ---
    function downloadAsMarkdown() {
      let markdown = "";
      
      const nodes = editor.childNodes;
      nodes.forEach(node => {
        if (node.nodeType === Node.TEXT_NODE) {
          markdown += node.textContent;
        } else if (node.nodeType === Node.ELEMENT_NODE) {
          if (node.classList.contains('image-block')) {
            const img = node.querySelector('img');
            const comment = node.querySelector('.image-comment');
            const imgSrc = img ? img.src : '';
            const commentText = comment ? comment.innerText.trim() : '';
            
            markdown += `\n\n![Pasted Image](${imgSrc})\n`;
            if (commentText) {
              markdown += `*コメント: ${commentText}*\n\n`;
            }
          } else if (node.classList.contains('column-row')) {
            const cells = node.querySelectorAll('.column-cell');
            markdown += `\n\n| カラム1 | カラム2 |\n| --- | --- |\n`;
            const col1 = cells[0] ? cells[0].innerText.replace(/\n/g, '<br>') : '';
            const col2 = cells[1] ? cells[1].innerText.replace(/\n/g, '<br>') : '';
            markdown += `| ${col1} | ${col2} |\n\n`;
          } else if (node.classList.contains('btn-wrapper')) {
            const btn = node.querySelector('.custom-action-btn');
            if (btn) {
              markdown += ` [${btn.innerText}] `;
            }
          } else {
            let html = node.innerHTML;
            // Basic tag conversions
            html = html.replace(/<b>(.*?)<\/b>/g, '**$1**');
            html = html.replace(/<strong>(.*?)<\/strong>/g, '**$1**');
            html = html.replace(/<i>(.*?)<\/i>/g, '*$1*');
            html = html.replace(/<em>(.*?)<\/em>/g, '*$1*');
            
            const temp = document.createElement('div');
            temp.innerHTML = html;
            markdown += temp.innerText + '\n';
          }
        }
      });

      const blob = new Blob([markdown], { type: 'text/markdown;charset=utf-8' });
      triggerFileDownload(blob, `brnote_${new Date().toISOString().slice(0,10)}.md`);
    }

    // Helper download trigger
    function triggerFileDownload(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 0);
      showToast("ファイルがダウンロードされました！");
    }
  </script>
</body>
</html>
